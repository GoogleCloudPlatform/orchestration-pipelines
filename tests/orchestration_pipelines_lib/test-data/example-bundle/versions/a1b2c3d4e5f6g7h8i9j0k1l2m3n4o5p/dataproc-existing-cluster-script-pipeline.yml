modelVersion: "1.0"
pipelineId: "dataproc-existing-cluster-script-pipeline"
description: "A pipeline with a Dataproc Existing cluster running the PySpark task."
runner: "airflow"
owner: "example-owner"
tags: ["dataproc_create_batch", "example"]
defaults:
  projectId: "example-project"
  location: "us-central1"
  executionConfig:
    retries: 0
triggers:
  - schedule:
      interval: "0 5 * * *"
      startTime: "2025-10-01T00:00:00"
      endTime: "2026-10-01T00:00:00"
      catchup: false
      timezone: "UTC"
actions:
  - pyspark:
      name: "run-pyspark-on-existing-cluster"
      engine:
        dataprocOnGce:
          existingCluster:
            clusterName: "cluster-f05f"
            location: "us-central1"
            projectId: "example-project"
            impersonationChain:
              - "dataproc-sa@example-project.iam.gserviceaccount.com"
      mainFilePath: "gs://example-bucket/data/my_spark_job.py"
