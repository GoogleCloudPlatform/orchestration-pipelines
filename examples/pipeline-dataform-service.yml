modelVersion: "1.0"
pipelineId: pipeline-dataform-service
description: "A pipeline that runs a Dataform workflow."
owner: "example-owner"
tags: ["dataform", "example"]
runner: "airflow"

defaults:
  projectId: "your-gcp-project-id"
  location: "us-central1"
  executionConfig:
    retries: 0

actions:
  - pipeline:
      name: "run_dataform"
      framework:
        dataform:
          dataformService:
            location: "us-central1"
            projectId: "your-gcp-project-id"
            repositoryId: "test"
            workflowInvocation:
              workflowConfig: "projects/your-gcp-project-id/locations/us-central1/repositories/test/workflowConfigs/example-test"

  - pipeline:
      name: "run_dataform_compilation"
      framework:
        dataform:
          dataformService:
            location: "us-central1"
            projectId: "your-gcp-project-id"
            repositoryId: "test"
            workflowInvocation:
              compilationResult: "projects/your-gcp-project-id/locations/us-central1/repositories/test/compilationResults/your-uuid"
              invocationConfig:
                serviceAccount: "your-service-account@your-gcp-project-id.iam.gserviceaccount.com"
