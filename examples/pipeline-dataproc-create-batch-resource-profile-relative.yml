modelVersion: "1.0"
pipelineId: "pipeline-dataproc-create-batch-resource-profile-relative"
description: "A pipeline with a DataprocCreateBatch task."
runner: "airflow"
owner: "data-eng-team"
tags: ["dataproc_create_batch", "example"]

defaults:
  projectId: "your-gcp-project-id"
  location: "us-central1"
  executionConfig:
    retries: 0

triggers:
  - schedule:
      interval: "0 5 * * *"
      startTime: "2025-10-01T00:00:00"
      endTime: "2026-10-01T00:00:00"
      catchup: false
      timezone: "UTC"

actions:
  - notebook:
      name: "run-notebook-on-dataproc-serverless"
      mainFilePath: "./data/notebookWithArchivesCheck.ipynb"
      archiveUris:
        - "./data/custom_venv.tar.gz"
      stagingBucket: "your-bucket"
      engine:
        dataprocServerless:
          location: "us-central1"
          resourceProfile:
            path: "batch-resource-profile.yml"
