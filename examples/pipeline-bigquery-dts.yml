modelVersion: "1.0"
pipelineId: "bigquery-dts-pipeline"
description: "Orchestrate and monitor the test-dts BigQuery Data Transfer Service run."
runner: "airflow"
owner: "data_eng"
tags: ["gcp", "bigquery", "test-dts"]

defaults:
  projectId: "your-gcp-project-id"
  location: "us"
  executionConfig:
    retries: 1

triggers:
  - schedule:
      interval: "0 0 * * *"
      startTime: "2026-01-01T00:00:00"
      catchup: false
      timezone: "UTC"

actions:
  - dataIngestion:
      name: "trigger_test_dts_run"
      bigqueryDts:
        transferConfigId: "your-transfer-config-id"
        projectId: "your-gcp-project-id"
        location: "us"
