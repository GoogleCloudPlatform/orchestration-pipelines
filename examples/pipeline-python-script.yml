modelVersion: "1.0"
pipelineId: "pipeline-python-script"
description: "A pipeline that sleeps for 15 minutes."
runner: airflow
owner: "example-team"
tags: ["example", "sleep"]

defaults:
  projectId: "your-gcp-project-id"
  location: "us-central1"
  executionConfig:
    retries: 0

triggers:
  - schedule:
      interval: "0 5 * * *"
      startTime: "2025-10-01T00:00:00"
      endTime: "2026-10-01T00:00:00"
      catchup: false
      timezone: "UTC"

actions:
  - python:
      name: "sleep_for_1_minute"
      mainFilePath: "./scripts/sleep.py"
      pythonCallable: "sleep_for"
      opKwargs:
        seconds: 60
      engine:
        local: {}
