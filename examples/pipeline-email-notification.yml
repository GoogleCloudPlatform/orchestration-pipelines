modelVersion: "1.0"
pipelineId: "pipeline-email-notification"
description: "A pipeline with a Dataproc Existing cluster running the PySpark task."
runner: "airflow"
owner: "data-eng-team"
tags: ["dataproc_create_batch", "example"]
notifications:
  onPipelineFailure:
    email: ["your-email@example.com", "another-email@example.com"]
defaults:
  projectId: "your-gcp-project-id"
  location: "us-central1"
  executionConfig:
    retries: 0
triggers:
  - schedule:
      interval: "0 5 * * *"
      startTime: "2025-10-01T00:00:00"
      endTime: "2026-10-01T00:00:00"
      catchup: false
      timezone: "UTC"

actions:
  - python:
      name: "shouldfail"
      mainFilePath: "./scripts/failing_script.py"
      pythonCallable: "fail_with_zero_division_error"
      engine:
        local: {}
