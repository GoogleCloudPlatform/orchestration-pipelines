name: batch-resource-profile-test-1
type: dataproc.session
definition:
  environmentConfig:
    executionConfig:
      serviceAccount: "your-service-account@your-gcp-project-id.iam.gserviceaccount.com"
      subnetworkUri: "projects/your-gcp-project-id/regions/us-central1/subnetworks/default"
  runtimeConfig:
    version: "2.3"
    properties:
      spark.app.name: "run-notebook-on-dataproc-serverless-10nov"
      spark.executor.instances: "2"
      spark.driver.cores: "4"
      spark.dataproc.driverEnv.PYTHONPATH: "./libs/lib/python3.11/site-packages"
      spark.executorEnv.PYTHONPATH: "./libs/lib/python3.11/site-packages"
